<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body class="bg-dark">
    <div class="container mt-5 p-4">
        <div class="row ">

            <div class="col-md-10 bg-secondary border border-4 border-primary text-white p-3 rounded-5">
                <h2>Employee Detail</h2>
                <form>
                    <div class="row">
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" class="form-control">
                            </div>
                        </div>

                        <div class="col-md-3">
                            <div class="mb-3">
                                <label class="form-label">Email address</label>
                                <input type="email" class="form-control" >
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label class="form-label">Phone</label>
                                <input type="number" class="form-control">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label class="form-label">Alt Number</label>
                                <input type="number" class="form-control">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-3">
                            <label for="exampleFormControlInput1" class="form-label">DOB</label>
                            <input type="date" class="form-control" placeholder="subject">

                        </div>
                        <div class="col-md-3">
                            <label for="exampleFormControlInput1" class="form-label">aadhar</label>
                            <input type="number" class="form-control" placeholder="">

                        </div>
                        <div class="col-md-3">
                            <label for="exampleFormControlInput1" class="form-label">Pan</label>
                            <input type="number" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label for="exampleFormControlInput1" class="form-label">Photo</label>
                                <input type="file" class="form-control" id="exampleFormControlInput1" accept="image/*">
                            </div>
                        </div>
                        <div class="row">
                            <div class="form-check col-md-3">
                                <label class="form-check-label" for="radioDefault1">
                                    Gender
                                </label>
                            </div>
                            <div class="form-check col-md-3">
                                <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                                <label class="form-check-label" for="radioDefault1">
                                    Male
                                </label>
                            </div>
                            <div class="form-check col-md-3">
                                <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                                <label class="form-check-label" for="radioDefault1">
                                    Female
                                </label>
                            </div>
                            <div class="form-check col-md-3">
                                <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                                <label class="form-check-label" for="radioDefault1">
                                    other
                                </label>
                            </div>
                        </div>
                        <div class="row mt-2">
                            <div class="col-md-6 mb-3">
                                <label>Blood Group</label>
                                    <select class="form-select" aria-label="Default select example">
                                        <option selected value="A+">A+</option>
                                        <option value="A-">A-</option>
                                        <option value="B+">B+</option>
                                        <option value="B-">B-</option>
                                         <option VALUE="B+">B+</option>
                                        <option value="AB+">AB+</option>
                                        <option value="AB-">AB-</option>
                                        <option value="O+">O+</option>
                                        <option value="O-">O-+</option>
                                    </select>
                        </div>
                        <div class="row me-4">
                            <div class="col-md-3"><label>Employee Id</label>
                                 <input type="number" class="form-control">
                            </div>
                            <div class="col-md-3">
                                <label>Dept Name</label>
                                 <input type="text" class="form-control">
                            </div>
                            <div class="col-md-3">
                                <label>Role</label>
                                 <input type="text" class="form-control">
                            </div>
                            <div class="col-md-3">
                            <label for="exampleFormControlInput1" class="form-label">DOJ</label>
                            <input type="date" class="form-control" placeholder="subject">
                        </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                                    <label class="form-check-label" for="checkDefault">
                                        I Accept all Terms and Conditions
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-2">
                                <div class="mb-3 text-primary">
                                    <input type="submit" class="form-control" id="exampleFormControlInput1">
                                </div>
                            </div>
                        </div>

                    </div>


                </form>

            </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
